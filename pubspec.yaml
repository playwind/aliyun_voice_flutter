name: aliyun_voice
description: Flutter plugin for Aliyun NUI SDK — speech recognition (ASR) and text-to-speech (TTS) on Android, iOS, and HarmonyOS.
version: 0.0.2
repository: https://github.com/playwind/aliyun_voice_flutter
issue_tracker: https://github.com/playwind/aliyun_voice_flutter/issues
license: BSD-3-Clause
topics:
  - speech
  - tts
  - asr
  - voice
  - aliyun

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.p1aywind.aliyun_voice
        pluginClass: NuiSdkPlugin
      ios:
        pluginClass: AliyunVoicePlugin
      ohos:
        pluginClass: AliyunVoicePlugin
